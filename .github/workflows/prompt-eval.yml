name: Prompt Eval

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Eval suite to run"
        required: true
        default: full
        type: choice
        options:
          - deterministic
          - full
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/lib/gemini.ts"
      - "src/lib/types.ts"
      - "src/lib/input.ts"
      - "evals/**"
      - ".github/workflows/prompt-eval.yml"
  push:
    branches: [main]
    paths:
      - "src/lib/gemini.ts"
      - "src/lib/types.ts"
      - "src/lib/input.ts"
      - "evals/**"
      - ".github/workflows/prompt-eval.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: Translate Prompt Eval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deterministic prompt eval
        if: github.event_name != 'workflow_dispatch' || inputs.suite == 'deterministic'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run eval

      - name: Run full prompt eval
        if: github.event_name == 'workflow_dispatch' && inputs.suite == 'full'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run eval:full

      - name: Upload eval artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prompt-eval-results
          path: evals/results/*.json
          if-no-files-found: warn
          retention-days: 30
